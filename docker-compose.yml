# ============================================================
# ClimateInsight — 全球气候智能分析平台
#
# 架构说明：
#   backend → 外部 MySQL (tier4_stu_mysql:3306)
#           → 外部 Hadoop/Hive 集群 (tier4_hadoop_net)
#   frontend → 代理 /api/ 到 backend
#
# docker compose up -d           # 启动前后端（依赖外部 MySQL）
# docker compose run --rm data-init  # 初始化数据（从 CSV 写入 MySQL）
# ============================================================

services:
  # ─── Flask API 后端 ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: climate_backend
    env_file: .env
    environment:
      # 默认连接外部 Hadoop 集群中的 MySQL
      MYSQL_HOST: ${MYSQL_HOST:-tier4_stu_mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-climate_dw}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      API_PORT: ${API_PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      AGENT_ENABLED: ${AGENT_ENABLED:-false}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "${API_PORT:-5000}:5000"
    networks:
      - default
      - hadoop    # 连接外部 Hadoop 网络（MySQL + Hive）
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pymysql; pymysql.connect(host='${MYSQL_HOST:-tier4_stu_mysql}', port=${MYSQL_PORT:-3306}, user='${MYSQL_USER:-root}', password='${MYSQL_PASSWORD}', database='${MYSQL_DATABASE:-climate_dw}').close()\" && echo 'DB OK'"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # ─── Nginx + Vue3 前端 ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: climate_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy  # 等待后端就绪
    restart: unless-stopped

  # ─── 数据初始化（一次性任务）───
  # 从预处理 CSV 直接写入 MySQL，绕过 Hive。
  # 运行方式：docker compose run --rm data-init
  # 前置条件：预处理 CSV 放在 ./data/ 目录下
  data-init:
    build:
      context: .
      dockerfile: Dockerfile.init
    container_name: climate_data_init
    env_file: .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-tier4_stu_mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-climate_dw}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data:/data          # 挂载 CSV 目录
    networks:
      - hadoop
    profiles: ["init"]        # 默认不启动，需手动运行
    restart: no

networks:
  default:
  hadoop:
    name: tier4_hadoop_net
    external: true            # 外部已有 Hadoop/Hive/MySQL 集群
