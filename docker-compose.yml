# ============================================================
# ClimateInsight — 全球气候智能分析平台
#
# 一键启动（自包含模式，无需外部依赖）：
#   docker compose up -d
#   bash scripts/setup.sh          # 下载并加载 2024 年数据
#   访问 http://localhost:8080
#
# 连接外部 Hadoop 集群：
#   docker compose -f docker-compose.yml -f docker-compose.hadoop.yml up -d
# ============================================================

services:
  # ─── MySQL 数据库 ───
  mysql:
    image: mysql:8.0
    container_name: climate_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-climate123}
      MYSQL_DATABASE: climate_dw
    ports:
      - "${MYSQL_PORT:-3307}:3306"    # 避免与本地 MySQL 冲突
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/mysql/001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./sql/mysql/002_create_users.sql:/docker-entrypoint-initdb.d/02_create_users.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-climate123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Flask API 后端 ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: climate_backend
    env_file: .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: climate_dw
      MYSQL_USER: ${MYSQL_USER:-climate_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-climate123}
      API_PORT: 5000
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      AGENT_ENABLED: ${AGENT_ENABLED:-false}
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pymysql; pymysql.connect(host='${MYSQL_HOST:-mysql}', port=${MYSQL_PORT:-3306}, user='${MYSQL_USER:-climate_app}', password='${MYSQL_PASSWORD:-climate123}', database='climate_dw').close()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─── Nginx + Vue3 前端 ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: climate_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ─── 数据加载（一次性任务）───
  # 从 NOAA GSOD 原始数据下载 → 预处理 → 写入 MySQL
  # docker compose run --rm setup-data
  setup-data:
    build:
      context: .
      dockerfile: Dockerfile.setup
    container_name: climate_setup_data
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: climate_dw
      MYSQL_USER: ${MYSQL_USER:-climate_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-climate123}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - climate_data:/data              # 持久化下载的原始数据
    profiles: ["setup"]                 # 仅手动运行
    restart: no

volumes:
  mysql_data:
  climate_data:
